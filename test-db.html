<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Base de Données</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .info { background: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 Test de la Base de Données Supabase</h1>
    
    <div id="results"></div>
    
    <button onclick="testConnection()">Tester la Connexion</button>
    <button onclick="testAuth()">Tester l'Authentification</button>
    <button onclick="testInsert()">Tester l'Insertion</button>
    <button onclick="clearResults()">Effacer</button>

    <script>
        // Configuration Supabase (remplacez par vos vraies valeurs)
        const SUPABASE_URL = 'https://yvkevfcfhnnzkrludxaw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2V2ZmNmaG5uemtybHVkeGF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTM2NjMsImV4cCI6MjA5MjE4OTY2M30.Mx8w_acYVl1hG-VEpfB0LTUxKvbgYYBkSw6IZbLBKfI';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function addResult(type, title, content) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${title}</strong><br><pre>${JSON.stringify(content, null, 2)}</pre>`;
            results.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testConnection() {
            try {
                addResult('info', '🔍 Test de connexion...', 'En cours...');
                
                const { data, error } = await supabase
                    .from('school_info')
                    .select('id')
                    .limit(1);
                
                if (error && error.code !== 'PGRST116') {
                    addResult('error', '❌ Erreur de connexion', error);
                } else {
                    addResult('success', '✅ Connexion réussie', 'La base de données est accessible');
                }
            } catch (e) {
                addResult('error', '❌ Exception', e.message);
            }
        }
        
        async function testAuth() {
            try {
                addResult('info', '🔍 Test d\'authentification...', 'Vérification de la session...');
                
                const { data: session } = await supabase.auth.getSession();
                
                if (session.session) {
                    addResult('success', '✅ Utilisateur connecté', {
                        userId: session.session.user.id,
                        email: session.session.user.email
                    });
                } else {
                    addResult('error', '❌ Aucune session', 'Vous devez vous connecter dans l\'application principale');
                }
            } catch (e) {
                addResult('error', '❌ Exception', e.message);
            }
        }
        
        async function testInsert() {
            try {
                const { data: session } = await supabase.auth.getSession();
                
                if (!session.session) {
                    addResult('error', '❌ Pas de session', 'Connectez-vous d\'abord dans l\'application');
                    return;
                }
                
                addResult('info', '🔍 Test d\'insertion...', 'Insertion d\'un étudiant de test...');
                
                const testStudent = {
                    user_id: session.session.user.id,
                    first_name: 'Test',
                    last_name: 'ÉTUDIANT',
                    matricule: 'TEST-' + Date.now(),
                    class_name: '6ème',
                    school_year: '2024-2025'
                };
                
                const { data, error } = await supabase
                    .from('students')
                    .insert(testStudent)
                    .select()
                    .single();
                
                if (error) {
                    addResult('error', '❌ Erreur d\'insertion', error);
                } else {
                    addResult('success', '✅ Insertion réussie', data);
                    
                    // Nettoyer le test
                    await supabase.from('students').delete().eq('id', data.id);
                    addResult('info', '🧹 Nettoyage', 'Étudiant de test supprimé');
                }
            } catch (e) {
                addResult('error', '❌ Exception', e.message);
            }
        }
        
        // Test automatique au chargement
        window.onload = function() {
            addResult('info', '🚀 Page chargée', 'Cliquez sur les boutons pour tester');
        };
    </script>
</body>
</html>
